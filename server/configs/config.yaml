server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

database:
  host: "localhost"
  port: 5432
  user: "mmo_user"
  password: "mmo_password"
  name: "mmo_db"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""

auth:
  jwt_secret: "change-this-secret-in-production"
  jwt_expiry: 24h
  bcrypt_cost: 10

server_limits:
  max_players_per_zone: 100
  max_characters_per_user: 5
  max_username_length: 50
  max_character_name_length: 30

movement:
  max_speed: 10.0
  position_sync_interval: 100ms
  anti_cheat_speed_threshold: 15.0
